<!DOCTYPE html>
<html>
<head>
    <title>Business Report Summarizer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>📊 Business Report Summarizer</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Summarize</button>
    </form>

    {% if summary %}
    <div class="output">
        <h2>📝 Summary</h2>
        <p>{{ summary }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
